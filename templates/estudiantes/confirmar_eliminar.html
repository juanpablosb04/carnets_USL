{% extends 'base.html' %}
{% block title %}Eliminar — {{ estudiante.nombre }}{% endblock %}

{% block content %}
<div class="container" style="max-width:500px;">
    <div class="card" style="text-align:center;padding:2.5rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
        <h2 style="font-size:1.3rem;margin-bottom:0.5rem;">¿Eliminar estudiante?</h2>
        <p style="color:var(--text2);font-size:0.9rem;margin-bottom:2rem;">
            Esta acción no se puede deshacer. Se eliminará <strong>{{ estudiante.nombre }}</strong> y todo su historial.
        </p>
        <form method="post" style="display:flex;gap:0.75rem;justify-content:center;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'detalle_estudiante' estudiante.pk %}" class="btn btn-ghost">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
