<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Carnets USL{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3247;
            --accent: #4f8ef7;
            --accent2: #7c3aed;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --text: #e8eaf0;
            --text2: #8b90a7;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-brand span { color: var(--accent); }

        .navbar-actions { display: flex; align-items: center; gap: 1rem; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.1rem;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            text-decoration: none;
        }

        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #3b7de8; text-decoration: none; color: #fff; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-danger:hover { background: #dc2626; text-decoration: none; color: #fff; }
        .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--surface2); color: var(--text); text-decoration: none; }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { background: #16a34a; text-decoration: none; color: #fff; }
        .btn-warning { background: var(--yellow); color: #000; }
        .btn-warning:hover { background: #d97706; text-decoration: none; }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }

        .messages { padding: 0 1.5rem; margin-top: 1rem; }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
        .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    {% block navbar %}
    <nav class="navbar">
        <div class="navbar-brand"> Sistema de Carnets USL</div>
        <div class="navbar-actions">
            {% if user.is_authenticated %}
                <span style="color:var(--text2);font-size:0.85rem;">{{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-ghost">Salir</a>
            {% endif %}
        </div>
    </nav>
    {% endblock %}

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
